# MinIO dev deployment for SUT clusters.
# Shipped with io.ht.build.plugin and auto-applied at order 2 when:
#
#   sut {
#       auxServices {
#           minio {
#               enabled = true
#               bucket  = "my-bucket"   // REQUIRED, no default
#           }
#       }
#   }
#
# NOT for production. Defaults: user=minio, password=minio12345, api=9000, console=9001, ephemeral storage.
# The placeholder __BUCKET__ is substituted by the plugin at extraction time.
---
apiVersion: v1
kind: Secret
metadata:
  name: minio
  labels:
    app: minio
    io.ht.build.plugin/aux: minio
type: Opaque
stringData:
  MINIO_ROOT_USER: minio
  MINIO_ROOT_PASSWORD: minio12345
  MINIO_DEFAULT_BUCKET: "__BUCKET__"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  labels:
    app: minio
    io.ht.build.plugin/aux: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        io.ht.build.plugin/aux: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          envFrom:
            - secretRef:
                name: minio
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    app: minio
    io.ht.build.plugin/aux: minio
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
---
# One-shot job that waits for MinIO and creates the configured bucket (idempotent).
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  labels:
    app: minio
    io.ht.build.plugin/aux: minio
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: minio
        io.ht.build.plugin/aux: minio
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BUCKET
              value: "__BUCKET__"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "[mc] waiting for minio service..."
              until mc alias set local http://minio:9000 minio minio12345 >/dev/null 2>&1; do
                sleep 2
              done
              echo "[mc] ensuring bucket '${BUCKET}' exists..."
              mc mb --ignore-existing "local/${BUCKET}"
              echo "[mc] done."
